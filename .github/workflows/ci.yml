name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check src/data/ingest_sources.py src/data/sources/espn_odds.py src/data/sources/nba_injuries_espn.py src/db/loaders.py src/models/feature_loader.py src/models/forward_test.py tests scripts/setup_forward_test.py

      - name: Mypy
        run: poetry run mypy src/data/ingest_sources.py src/db/loaders.py src/models/feature_loader.py src/data/sources/nba_injuries_espn.py src/data/sources/espn_odds.py

      - name: Pytest
        run: poetry run pytest
